name: Terraform Deploy (Reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Terraform working directory relative to repo root, e.g. ./infra'
        required: true
        type: string
      location:
        description: 'Azure region for state backend resources'
        required: false
        type: string
        default: westeurope
      terraform_state_rg:
        description: 'Resource group that holds the Terraform state storage account'
        required: true
        type: string
      terraform_state_storage:
        description: 'Storage account name for Terraform state'
        required: true
        type: string
      terraform_state_container:
        description: 'Blob container name for Terraform state'
        required: false
        type: string
        default: tfstate
      terraform_state_key:
        description: 'State file key within the container, e.g. dns.tfstate'
        required: true
        type: string
      environment:
        description: 'GitHub environment name used for the manual approval gate'
        required: false
        type: string
        default: production
      plan_artifact_name:
        description: 'Artifact name for the saved plan — must be unique per workflow run'
        required: false
        type: string
        default: terraform-plan
      run_apply:
        description: 'Set to true to run the approval + apply jobs (push/dispatch on main)'
        required: false
        type: boolean
        default: false
      is_pull_request:
        description: 'Set to true to post a plan summary comment on the PR'
        required: false
        type: boolean
        default: false
      verify_graph_permissions:
        description: 'Set to true to verify Graph API permissions (needed for AKS/AD group access, not for most repos)'
        required: false
        type: boolean
        default: false
      terraform_vars:
        description: 'Additional Terraform variables as a JSON object — each key becomes TF_VAR_<key>'
        required: false
        type: string
        default: '{}'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      GH_MODULE_TOKEN:
        required: true

jobs:
  setup-backend:
    name: Setup Terraform State Backend
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Terraform State Storage
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            if ! az group show --name ${{ inputs.terraform_state_rg }} &>/dev/null; then
              echo "Creating resource group ${{ inputs.terraform_state_rg }}"
              az group create -n ${{ inputs.terraform_state_rg }} -l ${{ inputs.location }}
            else
              echo "Resource group ${{ inputs.terraform_state_rg }} already exists"
            fi

            if ! az storage account show --name ${{ inputs.terraform_state_storage }} \
                --resource-group ${{ inputs.terraform_state_rg }} &>/dev/null; then
              echo "Creating storage account ${{ inputs.terraform_state_storage }}"
              az storage account create \
                -g ${{ inputs.terraform_state_rg }} \
                -l ${{ inputs.location }} \
                --name ${{ inputs.terraform_state_storage }} \
                --sku Standard_LRS \
                --encryption-services blob
            else
              echo "Storage account ${{ inputs.terraform_state_storage }} already exists"
            fi

            az storage container create \
              --name ${{ inputs.terraform_state_container }} \
              --account-name ${{ inputs.terraform_state_storage }} \
              --auth-mode login

            echo "Terraform backend storage configured"

  terraform-plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: setup-backend
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v7

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM environment variables
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_USE_AZUREAD=true" >> $GITHUB_ENV

      - name: Verify Service Principal Permissions
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az group list --query "[0:1].name" -o tsv &>/dev/null \
              && echo "✅ Azure resource permissions OK" \
              || { echo "❌ Missing Azure resource permissions"; exit 1; }

            if [ "${{ inputs.verify_graph_permissions }}" = "true" ]; then
              az ad group list --query "[0:1].displayName" -o tsv &>/dev/null \
                && echo "✅ Graph API permissions OK" \
                || { echo "❌ Missing Graph API permissions (need Group.Read.All or Directory.Read.All)"; exit 1; }
            fi

      - name: Setup Terraform and git credentials
        uses: elmi70/github-reusable-workflows/.github/actions/terraform-setup@main
        with:
          github-token: ${{ secrets.GH_MODULE_TOKEN }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.terraform_state_rg }}" \
            -backend-config="storage_account_name=${{ inputs.terraform_state_storage }}" \
            -backend-config="container_name=${{ inputs.terraform_state_container }}" \
            -backend-config="key=${{ inputs.terraform_state_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Set Terraform variables
        if: inputs.terraform_vars != '{}'
        run: |
          echo '${{ inputs.terraform_vars }}' | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> $GITHUB_ENV

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan -input=false

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: ${{ inputs.is_pull_request }}
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  terraform-approval:
    name: Await Manual Approval
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: ${{ inputs.run_apply }}
    environment: ${{ inputs.environment }}
    steps:
      - run: echo "Deployment approved"

  terraform-apply:
    name: Apply
    needs: [setup-backend, terraform-approval]
    runs-on: ubuntu-latest
    if: ${{ inputs.run_apply }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v7

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM environment variables
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_USE_AZUREAD=true" >> $GITHUB_ENV

      - name: Setup Terraform and git credentials
        uses: elmi70/github-reusable-workflows/.github/actions/terraform-setup@main
        with:
          github-token: ${{ secrets.GH_MODULE_TOKEN }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.terraform_state_rg }}" \
            -backend-config="storage_account_name=${{ inputs.terraform_state_storage }}" \
            -backend-config="container_name=${{ inputs.terraform_state_container }}" \
            -backend-config="key=${{ inputs.terraform_state_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: ${{ inputs.working_directory }}

      - name: Set Terraform variables
        if: inputs.terraform_vars != '{}'
        run: |
          echo '${{ inputs.terraform_vars }}' | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> $GITHUB_ENV

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
